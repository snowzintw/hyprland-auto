# Hyprland ≥ 0.54 — NÃO usar o nome tags.conf (é sobrescrito por ferramentas antigas).
# Este ficheiro é o que o hyprland.conf passa a sourcear.

windowrule = tag +multimedia_video, match:class ^([Mm]pv|vlc)$
windowrule = tag +settings, match:class ^(nm-applet|nm-connection-editor|blueman-manager|org.gnome.FileRoller)$
windowrule = tag +settings, match:class ^(org.gnome.DiskUtility|wihotspot(-gui)?)$
windowrule = tag +viewer, match:class ^(org.gnome.SystemMonitor)$
windowrule = tag +viewer, match:class ^(org.gnome.Evince)$
windowrule = tag +viewer, match:class ^(eog|org.gnome.Loupe)$
